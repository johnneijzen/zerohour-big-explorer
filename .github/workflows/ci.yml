name: CI
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: '${{ runner.os }}-cargo-${{ hashFiles(''**/Cargo.lock'') }}'
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: '${{ runner.os }}-target-${{ hashFiles(''**/Cargo.lock'') }}'
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: >-
          cargo clippy --workspace --exclude big-tauri --all-targets -- -D
          warnings
      - name: Build Rust workspace
        run: cargo build --workspace --all-targets --verbose
      - name: Run tests
        run: cargo test --workspace --all --verbose
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Build big-tauri frontend
        working-directory: big-tauri
        run: |
          pnpm install --frozen-lockfile || pnpm install
          pnpm build
